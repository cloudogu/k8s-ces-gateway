networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  podSelector:
    matchLabels:
      k8s.cloudogu.com/component.name: k8s-ces-gateway
  ingress:
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP

traefik:
  enabled: true
  installCRDs: true
  deployment:
    imagePullSecrets:
      - name: ces-container-registries
    additionalVolumes:
      - name: rewritebody-src
        configMap:
          name: ces-gateway-traefik-plugin-rewritebody
      - name: ces-error-pages-src
        configMap:
          name: ces-gateway-traefik-plugin-ces-error-pages

    additionalVolumeMounts:
        - name: rewritebody-src
          mountPath: /plugins-local/src/github.com/traefik/plugin-rewritebody
          readOnly: true
        - name: ces-error-pages-src
          mountPath: /plugins-local/src/github.com/traefik/plugin-ces-error-pages
          readOnly: true

  experimental:
    localPlugins:
      rewritebody:
        moduleName: github.com/traefik/plugin-rewritebody
        mountPath: /plugins-local/src/github.com/traefik/plugin-rewritebody
        type: localPath
        volumeName: rewritebody-src
      ces-error-pages:
        moduleName: github.com/traefik/plugin-ces-error-pages
        mountPath: /plugins-local/src/github.com/traefik/plugin-ces-error-pages
        type: localPath
        volumeName: ces-error-pages-src

  image:
    registry: docker.io
    repository: traefik
    tag:  v3.6.12
    pullPolicy: IfNotPresent

  ingressClass:
    enabled: true
    isDefaultClass: true
    name: "k8s-ecosystem-ces-service"

  ingressRoute:
    dashboard:
      enabled: true

  providers:
    kubernetesIngress:
      enabled: true
      ingressClass: k8s-ecosystem-ces-service
      namespaces: []
    kubernetesCRD:
      enabled: true
      namespaces: []

  logs:
    general:
      level: "DEBUG"  # DEBUG, INFO, WARN, ERROR
    access:
      enabled: true

  ports:
    web:
      port: 80
      exposedPort: 80
    websecure:
      port: 443
      exposedPort: 443
      middlewares:
        - ecosystem-ces-chain@kubernetescrd
        - ecosystem-ces-error@kubernetescrd
    # open static ports for exposed ports in dogus until traefik can load these ports dynamically
    # scm
    tcp-2222:
      port: 2222
      protocol: TCP
    ## jenkins
    tcp-50000:
      port: 50000
      protocol: TCP
  service:
    enabled: false

  tlsStore:
    default:
      defaultCertificate:
        secretName: ecosystem-certificate

  tls:
    options:
      default:
        minVersion: VersionTLS13
        cipherSuites:
          - TLS_AES_128_GCM_SHA256
          - TLS_AES_256_GCM_SHA384